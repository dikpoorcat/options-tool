server {
    listen 80;
    server_name apps.hundao.xyz;

    # Let's Encrypt HTTP 验证路径
    location /.well-known/acme-challenge/ {
        allow all;
    }

    # 强制将 HTTP 请求重定向到 HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name apps.hundao.xyz;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

# ===================================== 1_miscarry_calc =====================================

    # 统一把无斜杠版本跳转到带斜杠
    location = /1_miscarry_calc {
        return 301 /1_miscarry_calc/;
    }

    # API 路径
    location ^~ /1_miscarry_calc/apiv1/ {
        proxy_pass http://127.0.0.1:5003/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # （若以后定义了 proxy_cache 仍强制不缓存）
        proxy_cache_valid any 0;
        proxy_no_cache 1;
        proxy_cache_bypass 1;

        # 明确告诉下游和 CDN 不缓存
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0, s-maxage=0, private" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;

        # # CORS
        # add_header 'Access-Control-Allow-Origin' 'http://localhost:5173' always;
        # add_header 'Vary' 'Origin' always; // 避免缓存导致错误的跨域头
        # add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
        # add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization' always;
    }

    # 渲染资源路径
    location ^~ /1_miscarry_calc/images/ {
        proxy_pass http://127.0.0.1:5003/images/;
        types {
            image/avif avif;
            image/png png;
            image/jpeg jpg jpeg;
            image/webp webp;
            image/gif gif;
        }
        proxy_hide_header Content-Disposition;  # 确保不设置 Content-Disposition 头
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # 关键：根据状态码设置不同的缓存策略
        proxy_cache_valid 200 1y;  # 成功响应缓存1年
        # proxy_cache_valid 404 5m;  # 404响应只缓存5分钟
        proxy_cache_valid any 0;   # 其他响应不缓存
        
        # 处理 OPTIONS 请求
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '*';
            add_header 'Access-Control-Allow-Methods' 'GET, PUT, OPTIONS';
            add_header 'Access-Control-Allow-Headers' 'Content-Type';
            add_header 'Cache-Control' 'no-cache, max-age=0';
            return 204;
        }
    }

    # 静态资源 1_miscarry_calc
    location ^~ /1_miscarry_calc/ {
        alias /var/hundao/apps/1_miscarry_calc/;
        try_files $uri $uri/ /1_miscarry_calc/index.html;
    }

# ===================================== 2_options_calc =====================================

    # 静态资源 2_options_calc
    location ^~ /2_options_calc/api/ {
        proxy_pass http://127.0.0.1:8787/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_connect_timeout 15s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
        proxy_cache_valid any 0;
        proxy_no_cache 1;
        proxy_cache_bypass 1;

        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0, s-maxage=0, private" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
    }

    location ^~ /2_options_calc/ {
        alias /var/hundao/apps/2_options_calc/;
        try_files $uri $uri/ /2_options_calc/index.html;
    }

    ssl_certificate /etc/letsencrypt/live/apps.hundao.xyz/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/apps.hundao.xyz/privkey.pem; # managed by Certbot
}

# --------------------------------------------------------------------
# 保存配置后使用命令重载 Nginx：
# sudo nginx -t && sudo nginx -s reload
